app-id: com.kartoza.ZfsBackup
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: zfs-backup

# Note: Flatpak sandboxing is not ideal for ZFS tools which need
# direct access to block devices and ZFS kernel modules.
# Consider using native packages (Nix, RPM, AUR) instead.
finish-args:
  - --filesystem=host
  - --device=all
  - --share=network

modules:
  - name: zfs-backup
    buildsystem: simple
    build-options:
      env:
        GOROOT: /usr/lib/sdk/golang
        PATH: /usr/lib/sdk/golang/bin:/usr/bin
        CGO_ENABLED: "0"
    build-commands:
      - |
        export GOPATH=$PWD/go
        export GOCACHE=$PWD/go-cache
        go build -ldflags="-s -w" -o zfs-backup .
        install -Dm755 zfs-backup ${FLATPAK_DEST}/bin/zfs-backup
    sources:
      - type: git
        url: https://github.com/timlinux/zfs-backup.git
        tag: v1.2.0
