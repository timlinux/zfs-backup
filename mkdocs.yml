# SPDX-FileCopyrightText: Tim Sutton / Kartoza
# SPDX-License-Identifier: MIT
site_name: Kartoza ZFS Backup Tool
site_description: A beautiful terminal UI for managing ZFS backups — incremental, encrypted, multi-host, with full live progress reporting.
site_url: https://timlinux.github.io/zfs-backup/
site_author: Tim Sutton / Kartoza
copyright: >
  &copy; Kartoza — Made with 💗 by
  <a href="https://kartoza.com">Kartoza</a>
  &middot; <a href="https://github.com/sponsors/kartoza">Donate</a>
  &middot; <a href="https://github.com/timlinux/zfs-backup">GitHub</a>

repo_url: https://github.com/timlinux/zfs-backup
repo_name: timlinux/zfs-backup
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/images/kartoza-zfs-backup.png
  favicon: assets/images/kartoza-zfs-backup.png
  font:
    text: Nunito
    code: JetBrains Mono
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/file-edit-outline
    view: material/eye-outline

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/timlinux/zfs-backup
      name: GitHub repository
    - icon: fontawesome/solid/globe
      link: https://kartoza.com
      name: Kartoza
    - icon: fontawesome/solid/heart
      link: https://github.com/sponsors/kartoza
      name: Sponsor on GitHub
  generator: false

extra_css:
  - stylesheets/kartoza-tokens.css
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds: {case: lower}
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - no-lightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      strict: false
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
  - User Guide:
    - user-guide/index.md
    - Getting Started: user-guide/getting-started.md
    - Backup Operations: user-guide/backup-operations.md
    - Restore Files: user-guide/restore-files.md
    - Pool Information: user-guide/pool-info.md
    - Pool Maintenance: user-guide/pool-maintenance.md
    - Keyboard Shortcuts: user-guide/keyboard-shortcuts.md
  - Administrator Guide:
    - admin-guide/index.md
    - Installation: admin-guide/installation.md
    - Configuration: admin-guide/configuration.md
    - ZFS Delegation: admin-guide/zfs-delegation.md
    - Packaging: admin-guide/packaging.md
  - Developer Guide:
    - developer-guide/index.md
    - Architecture: developer-guide/architecture.md
    - Building: developer-guide/building.md
    - Contributing: developer-guide/contributing.md
  - About:
    - about/index.md
    - License: about/license.md
    - Sponsors: about/sponsors.md
