name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version-check:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '\n')
          echo "Git tag version:  $TAG"
          echo "VERSION file:     $FILE_VERSION"
          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "::error::Tag v$TAG does not match VERSION file \"$FILE_VERSION\". Update the VERSION file before tagging."
            exit 1
          fi
          echo "Versions match."

  build:
    name: Build binaries
    needs: version-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          # Windows not supported - ZFS uses Unix-specific syscalls

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(cat VERSION | tr -d '\n')
          go build -ldflags="-s -w -X main.appVersion=${VERSION}" -o zfs-backup-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zfs-backup-${{ matrix.suffix }}
          path: zfs-backup-${{ matrix.suffix }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: Create checksums
        run: |
          cd binaries
          sha256sum * > checksums-sha256.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
